<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN INDIA ECO INDUSTRIES</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌌 PARTICLE BACKGROUND -->
<div id="particles-js"></div>

<!-- 🌿 NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="logo">
        <span>Green India</span>
    </div>

    <input type="text" placeholder="Search eco products..." class="search">

    <ul class="nav-links">
        <li>Home</li>
        <li>Products</li>
        <li>About</li>
        <li>Contact</li>
    </ul>
</nav>

<!-- 🌍 HERO SECTION -->
<section class="hero">

    <!-- TEXT -->
    <div class="hero-text">
        <h1>Say No to Plastic 🌱</h1>
        <p>
            Switch to eco-friendly, compostable alternatives and help build a cleaner,
            greener future for the next generation.
        </p>

        <!-- 🔥 3D BUTTON -->
        <button class="btn-3d">Shop Now</button>
    </div>

    <!-- IMAGE -->
    <div class="hero-img">
        <img src="{{ url_for('static', filename='images/poster.jpg') }}" alt="eco">
    </div>

</section>

<!-- 🌿 FEATURES -->
<section class="features">
    <div class="card">🌿 Eco Friendly</div>
    <div class="card">🛡 Non-Toxic & Safe</div>
    <div class="card">♻ Zero Plastic Waste</div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Green India | Save Nature 🌍</p>
</footer>

<!-- 🔹 PARTICLE SCRIPT -->
<script src="{{ url_for('static', filename='particle.js') }}"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#2e7d32" }
  }
});
</script>

</body>
</html>
